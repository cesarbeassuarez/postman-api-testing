$kind: http-request
description: "Testing negativo: ambos campos incorrectos. Espera 400 + AuthenticationError."
url: "{{baseUrl}}/Account/Login"
method: POST
headers:
  accept: application/json
  content-type: application/json
  x-csrf-token: "{{csrfToken}}"
body:
  type: json
  content: '{"Username":"abcd","Password":"abcd"}'
scripts:
  - type: beforeRequest
    code: "const csrfCookie = pm.cookies.get('CSRF-TOKEN');\r

      if (csrfCookie) {\r

      \    pm.variables.set('csrfToken', csrfCookie);\r

      \    console.log('csrfToken actualizado desde cookie jar');\r

      } else {\r

      \    console.log('No se encontró la cookie CSRF-TOKEN');\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 400\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Response has AuthenticationError\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.Error).to.not.be.undefined;\r

      \    pm.expect(jsonData.Error.Code).to.eql(\"AuthenticationError\");\r

      });\r

      \r

      pm.test(\"Error message is generic (no field hint)\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.Error.Message).to.eql(\"Invalid username or
      password!\");\r

      });"
    language: text/javascript
order: 6000
