$kind: http-request
description: Obtiene los datos completos del cliente CESBS vía
  /Customer/Retrieve. Valida 200 + CustomerID y ContactName originales. Estado
  "antes" del Update.
url: "{{baseUrl}}/Services/Northwind/Customer/Retrieve"
method: POST
headers:
  x-csrf-token: "{{csrfToken}}"
body:
  type: json
  content: "{\r\n    \"EntityId\": \"CESBS\"\r\n}"
scripts:
  - type: beforeRequest
    code: "const csrf = pm.environment.get(\"csrfToken\");\r

      if (csrf) {\r

      \    pm.request.headers.upsert({\r

      \        key: \"x-csrf-token\",\r

      \        value: csrf\r

      \    });\r

      } else {\r

      \    console.log(\"No hay csrfToken en environment para POST - Retrieve
      Customer\");\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Entity is CESBS\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.Entity.CustomerID).to.eql(\"CESBS\");\r

      \    pm.expect(jsonData.Entity.ContactName).to.eql(\"Cesar Beas
      Suarez\");\r

      });"
    language: text/javascript
order: 11000
