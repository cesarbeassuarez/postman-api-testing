$kind: http-request
description: "Consulta la grilla de clientes. Baseline: 91 registros. Valida
  estructura JSON, TotalCount y campos de cada entidad."
url: "{{baseUrl}}/Services/Northwind/Customer/List"
method: POST
headers:
  x-csrf-token: "{{csrfToken}}"
body:
  type: json
  content: "{\r

    \  \"Take\": 100,\r

    \  \"EqualityFilter\": {\r

    \    \"Country\": \"\",\r

    \    \"City\": \"\",\r

    \    \"Representatives\": []\r

    \  },\r

    \  \"IncludeColumns\": [\r

    \    \"CustomerID\",\r

    \    \"CompanyName\",\r

    \    \"ContactName\",\r

    \    \"ContactTitle\",\r

    \    \"Region\",\r

    \    \"PostalCode\",\r

    \    \"Country\",\r

    \    \"City\"\r

    \  ]\r

    }"
scripts:
  - type: beforeRequest
    code: "const csrf = pm.environment.get(\"csrfToken\");\r

      if (csrf) {\r

      \    pm.request.headers.upsert({\r

      \        key: \"x-csrf-token\",\r

      \        value: csrf\r

      \    });\r

      } else {\r

      \    console.log(\"No hay csrfToken en environment para Customer
      List\");\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response is JSON\", function () {\r

      \    pm.response.to.have.header(\"Content-Type\");\r

      \    pm.expect(pm.response.headers.get(\"Content-Type\")).to.include(\"ap\
      plication/json\");\r

      });\r

      \r

      pm.test(\"Response has Entities array\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData).to.have.property(\"Entities\");\r

      \    pm.expect(jsonData.Entities).to.be.an(\"array\");\r

      });\r

      \r

      pm.test(\"TotalCount is 91\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.TotalCount).to.eql(91);\r

      });\r

      \r

      pm.test(\"Each entity has CustomerID and CompanyName\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    jsonData.Entities.forEach(function (entity) {\r

      \        pm.expect(entity).to.have.property(\"CustomerID\");\r

      \        pm.expect(entity).to.have.property(\"CompanyName\");\r

      \    });\r

      });\r

      \r

      // Schema validation con Ajv\r

      const Ajv = require('ajv');\r

      const ajv = new Ajv({ allErrors: true });\r

      \r

      const customerSchema = {\r

      \    type: \"object\",\r

      \    required: [\"Entities\", \"TotalCount\", \"Skip\", \"Take\"],\r

      \    properties: {\r

      \        TotalCount: { type: \"integer\" },\r

      \        Skip: { type: \"integer\" },\r

      \        Take: { type: \"integer\" },\r

      \        Entities: {\r

      \            type: \"array\",\r

      \            items: {\r

      \                type: \"object\",\r

      \                required: [\"CustomerID\", \"CompanyName\",
      \"ContactName\", \"ContactTitle\", \"Address\", \"City\",
      \"Country\",\"Phone\"],\r

      \                properties: {\r

      \                    CustomerID: { type: \"string\" },\r

      \                    CompanyName: { type: \"string\" },\r

      \                    ContactName: { type: \"string\" },\r

      \                    ContactTitle: { type: \"string\" },\r

      \                    Address: { type: \"string\" },\r

      \                    City: { type: \"string\" },\r

      \                    Region: { type: \"string\" },\r

      \                    PostalCode: { type: \"string\" },\r

      \                    Country: { type: \"string\" },\r

      \                    Phone: { type: \"string\" },\r

      \                    Fax: { type: \"string\" }\r

      \                },\r

      \                additionalProperties: false\r

      \            }\r

      \        }\r

      \    },\r

      \    additionalProperties: false\r

      };\r

      \r

      const jsonData = pm.response.json();\r

      const validate = ajv.compile(customerSchema);\r

      const valid = validate(jsonData);\r

      \r

      \r

      pm.test(\"Response matches Customer List schema\", function () {\r

      \    if (!valid) {\r

      \        // Resumir errores por tipo\r

      \        const summary = {};\r

      \        validate.errors.forEach(err => {\r

      \            const key = err.schemaPath + \" | \" + err.message;\r

      \            if (!summary[key]) {\r

      \                summary[key] = { count: 0, example: err.dataPath };\r

      \            }\r

      \            summary[key].count++;\r

      \        });\r

      \        \r

      \        console.log(\"Schema errors (resumen):\");\r

      \        Object.keys(summary).forEach(key => {\r

      \            console.log(`  ${key} (${summary[key].count}x) — ejemplo:
      ${summary[key].example}`);\r

      \        });\r

      \    }\r

      \    pm.expect(valid).to.be.true;\r

      });\r\n"
    language: text/javascript
order: 8000
