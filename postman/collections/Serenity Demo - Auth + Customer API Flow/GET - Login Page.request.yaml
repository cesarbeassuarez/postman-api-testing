$kind: http-request
description: StartFragmentObtiene el token CSRF para usuario anónimo. Primera
  request del flujo.
url: "{{baseUrl}}/Account/Login/?ReturnUrl=%2F"
method: GET
queryParams:
  ReturnUrl: "%2F"
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: "const csrfCookie = pm.cookies.get('CSRF-TOKEN');\r

      console.log('GET Login Page - CSRF cookie:', csrfCookie);\r

      if (csrfCookie) {\r

      \    pm.environment.set('csrfToken', csrfCookie);\r

      \    console.log('csrfToken guardado en environment');\r

      } else {\r

      \    console.log('No se encontró CSRF-TOKEN en GET - Login Page');\r

      }\r

      \r

      pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response is HTML\", function () {\r

      \    pm.response.to.have.header(\"Content-Type\");\r

      \    pm.expect(pm.response.headers.get(\"Content-Type\")).to.include(\"te\
      xt/html\");\r

      });\r

      \r

      pm.test(\"CSRF-TOKEN cookie exists\", function () {\r

      \    const csrfCookie = pm.cookies.get(\"CSRF-TOKEN\");\r

      \    pm.expect(csrfCookie).to.not.be.undefined;\r

      });"
    language: text/javascript
order: 1000
